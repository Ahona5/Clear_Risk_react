<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Logs | Clear Risk</title>
    <link rel="stylesheet" href="src/styles/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        .main {
            flex: 1;
            min-width: 0;
            padding: 40px !important;
            margin-left: 260px;
            transition: all 0.3s;
        }

        body.sidebar-collapsed .main {
            margin-left: 80px;
        }

        /* FILTERS SECTION */
        .filter-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            position: relative;
            flex: 1;
            min-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 45px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .search-box input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.5;
        }

        .filter-pills {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .pill {
            padding: 8px 16px;
            border-radius: 20px;
            background: #fff;
            border: 1px solid #e2e8f0;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pill:hover {
            border-color: #3b82f6;
            color: #3b82f6;
        }

        .pill.active {
            background: #0f172a;
            color: #fff;
            border-color: #0f172a;
        }

        /* TIMELINE UI */
        .timeline-container {
            position: relative;
            padding-left: 50px;
            margin-top: 20px;
        }

        .timeline-container::before {
            content: "";
            position: absolute;
            left: 19px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e2e8f0;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 30px;
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .timeline-icon {
            position: absolute;
            left: -50px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 2;
            transition: all 0.2s;
        }

        .timeline-content {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
            transition: all 0.2s;
        }

        .timeline-content:hover {
            transform: translateX(5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .timeline-title {
            font-size: 15px;
            font-weight: 700;
            color: #1e293b;
        }

        .timeline-time {
            font-size: 12px;
            color: #94a3b8;
            font-weight: 500;
        }

        .timeline-desc {
            font-size: 14px;
            color: #64748b;
            line-height: 1.5;
        }

        .timeline-user {
            font-weight: 600;
            color: #0f172a;
        }

        /* STATUS COLORS */
        .status-create .timeline-icon { border-color: #22c55e; color: #22c55e; }
        .status-update .timeline-icon { border-color: #3b82f6; color: #3b82f6; }
        .status-delete .timeline-icon { border-color: #ef4444; color: #ef4444; }
        .status-escalate .timeline-icon { border-color: #f59e0b; color: #f59e0b; }
        .status-login .timeline-icon { border-color: #6366f1; color: #6366f1; }
        .status-logout .timeline-icon { border-color: #94a3b8; color: #94a3b8; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #fff;
            border-radius: 16px;
            border: 2px dashed #e2e8f0;
            color: #94a3b8;
        }

        .empty-state span {
            font-size: 48px;
            display: block;
            margin-bottom: 15px;
        }

        /* Sidebar/Topbar overrides for consistency */
        .sidebar { background: #0f172a !important; }
        .sidebar li.active { background: rgba(255, 255, 255, 0.1) !important; color: #fff !important; }
        .topbar { background: #fff !important; border-bottom: 1px solid #f1f5f9 !important; }

    </style>
</head>
<body>

    <div class="topbar">
        <div class="top-left">
            <div class="sidebar-toggle">☰</div>
            <img src="public/images/logo.png" alt="Logo" class="nav-logo">
        </div>
        <div class="top-right">
            <div class="profile-avatar">A</div>
        </div>
    </div>

    <div class="dashboard-container">
        <div class="sidebar">
            <ul>
                <li onclick="window.location.href='/dashboard'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    <span>Dashboard</span>
                </li>
                <li onclick="window.location.href='risk_profiles.html'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                    <span>Risk Profiles</span>
                </li>
                <li onclick="window.location.href='users.html'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    <span>Users</span>
                </li>
                <li class="active" onclick="window.location.href='activity.html'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    <span>Activity</span>
                </li>
            </ul>
        </div>

        <div class="main">
            <div class="dashboard-header">
                <div>
                    <h1>Activity Logs</h1>
                    <p>Track all user and system actions</p>
                </div>
            </div>

            <div class="filter-container">
                <div class="search-box">
                    <input type="text" id="log-search" placeholder="Search by user name...">
                </div>
                <div class="filter-pills" id="type-filters">
                    <button class="pill active" data-type="all">All</button>
                    <button class="pill" data-type="CREATE">Created</button>
                    <button class="pill" data-type="UPDATE">Updated</button>
                    <button class="pill" data-type="DELETE">Deleted</button>
                    <button class="pill" data-type="ESCALATE">Escalated</button>
                </div>
            </div>

            <div class="timeline-container" id="activity-timeline">
                <!-- Activity items will be rendered here -->
            </div>
        </div>
    </div>

    <script src="activity.js"></script>
</body>
</html>
